name: Release

# LED-1088 — signed, replayable attestation for every release.
#
# Triggers on tag push (vX.Y.Z) or manual dispatch.
# Produces four artifacts attached to the GitHub Release:
#   - <tag>.tar.gz              source tarball (git archive)
#   - <tag>.tar.gz.sha256       sha256 checksum (hygiene, not trust root)
#   - <tag>.tar.gz.sigstore     Sigstore bundle (Rekor-logged keyless signature)
#   - sbom.cdx.json             CycloneDX SBOM
#
# Also publishes an SLSA build-provenance attestation via
# actions/attest-build-provenance@v2, which binds (repo, commit, workflow,
# runner) into a cryptographic claim that a third party can verify with:
#
#   gh attestation verify <tag>.tar.gz --owner delimit-ai
#
# The Sigstore signature is keyless (GitHub OIDC → Fulcio short-lived cert)
# and logged to Rekor so the signature exists in a public transparency log
# even after the certificate expires.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.7.0)'
        required: true

permissions:
  contents: write        # create releases, upload assets
  id-token: write        # OIDC token for keyless Sigstore signing
  attestations: write    # SLSA build-provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git archive needs full history for clean tags

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source tarball
        id: build
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          TARBALL="delimit-action-${TAG}.tar.gz"
          git archive --format=tar.gz --prefix="delimit-action-${TAG}/" -o "$TARBALL" HEAD
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.build.outputs.tarball }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign tarball with Cosign (keyless)
        run: |
          TARBALL="${{ steps.build.outputs.tarball }}"
          cosign sign-blob --yes \
            --bundle "${TARBALL}.sigstore" \
            "$TARBALL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.tarball }}
            ${{ steps.build.outputs.tarball }}.sha256
            ${{ steps.build.outputs.tarball }}.sigstore
            sbom.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
